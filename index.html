<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Калькулятор программ обучения</title>
  <style>
    :root {
      --bg: #FDFBF7;
      --card: rgba(255, 255, 255, 0.82);
      --text: #3F3A34;
      --muted: #7A7268;
      --gold: #D4AF37;
      --gold-soft: #F2E2A6;
      --gray-pill: #ECE7DE;
      --green-pill: #DDEBDD;
      --green-text: #45634B;
      --gold-pill: #F3E6BE;
      --gold-text: #7B5D11;
      --shadow: 0 18px 45px rgba(75, 63, 38, 0.10);
      --radius: 26px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(212, 175, 55, 0.08), transparent 28%),
        var(--bg);
      font-family: Inter, "Segoe UI", sans-serif;
      color: var(--text);
    }

    .card {
      width: min(100%, 620px);
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(212, 175, 55, 0.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 42px 34px 36px;
      text-align: center;
    }

    .title {
      margin: 0 0 28px;
      font-size: clamp(28px, 4vw, 38px);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .hours-value {
      margin-bottom: 18px;
      font-size: clamp(34px, 5vw, 48px);
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .hours-value span {
      font-size: 0.42em;
      font-weight: 500;
      color: var(--muted);
      margin-left: 6px;
    }

    .slider-wrap {
      width: 100%;
      padding: 10px 2px 0;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(to right, var(--gold) 0%, var(--gold) var(--progress, 0%), #E8E0D2 var(--progress, 0%), #E8E0D2 100%);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 999px;
      background: transparent;
    }

    input[type="range"]::-moz-range-track {
      height: 8px;
      border-radius: 999px;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(145deg, #E6C763, var(--gold));
      border: 3px solid #FFF9EC;
      box-shadow: 0 6px 18px rgba(212, 175, 55, 0.35);
      margin-top: -8px;
      transition: transform 0.15s ease;
    }

    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(145deg, #E6C763, var(--gold));
      border: 3px solid #FFF9EC;
      box-shadow: 0 6px 18px rgba(212, 175, 55, 0.35);
      transition: transform 0.15s ease;
    }

    input[type="range"]:active::-webkit-slider-thumb,
    input[type="range"]:focus::-webkit-slider-thumb,
    input[type="range"]:active::-moz-range-thumb,
    input[type="range"]:focus::-moz-range-thumb {
      transform: scale(1.06);
    }

    .scale {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 260px;
      margin: 28px auto 14px;
      padding: 15px 24px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 600;
      box-shadow: 0 10px 24px rgba(90, 72, 40, 0.10);
      transition: background-color 0.25s ease, color 0.25s ease, transform 0.25s ease;
    }

    .status-gray {
      background: var(--gray-pill);
      color: #5E564D;
    }

    .status-green {
      background: var(--green-pill);
      color: var(--green-text);
    }

    .status-gold {
      background: var(--gold-pill);
      color: var(--gold-text);
    }

    .hint {
      margin: 0;
      min-height: 48px;
      font-size: 16px;
      line-height: 1.55;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .card {
        padding: 32px 20px 28px;
      }

      .status-pill {
        min-width: 100%;
        font-size: 17px;
      }

      .hint {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">Объем программы</h1>

    <div class="hours-value" id="hoursValue">0 <span>часов</span></div>

    <div class="slider-wrap">
      <input id="hoursSlider" type="range" min="0" max="300" value="0" step="1" aria-label="Выберите объем программы в часах" />
      <div class="scale" aria-hidden="true">
        <span>0</span>
        <span>300</span>
      </div>
    </div>

    <div id="statusPill" class="status-pill status-gray">Выберите часы</div>
    <p id="hintText" class="hint">Выберите объем программы, чтобы увидеть формат обучения и выдаваемый документ.</p>
  </main>

  <script>
    const slider = document.getElementById('hoursSlider');
    const hoursValue = document.getElementById('hoursValue');
    const statusPill = document.getElementById('statusPill');
    const hintText = document.getElementById('hintText');

    function getStatus(hours) {
      if (hours === 0) {
        return {
          label: 'Выберите часы',
          className: 'status-gray',
          hint: 'Выберите объем программы, чтобы увидеть формат обучения и выдаваемый документ.'
        };
      }

      if (hours >= 1 && hours <= 15) {
        return {
          label: 'Микрокурс',
          className: 'status-gray',
          hint: 'Короткая программа. Документ об образовании обычно не выдается.'
        };
      }

      if (hours >= 16 && hours <= 249) {
        return {
          label: 'Повышение квалификации',
          className: 'status-green',
          hint: 'По итогам такой программы выдается удостоверение о повышении квалификации.'
        };
      }

      return {
        label: 'Профессиональная переподготовка',
        className: 'status-gold',
        hint: 'По итогам такой программы выдается диплом о профессиональной переподготовке.'
      };
    }

    function updateProgress() {
      const min = Number(slider.min);
      const max = Number(slider.max);
      const value = Number(slider.value);
      const progress = ((value - min) / (max - min)) * 100;
      slider.style.setProperty('--progress', `${progress}%`);
    }

    function updateUI() {
      const hours = Number(slider.value);
      const status = getStatus(hours);

      hoursValue.innerHTML = `${hours} <span>${hours === 1 ? 'час' : hours >= 2 && hours <= 4 ? 'часа' : 'часов'}</span>`;
      statusPill.textContent = status.label;
      statusPill.className = `status-pill ${status.className}`;
      hintText.textContent = status.hint;
      updateProgress();
    }

    slider.addEventListener('input', updateUI);
    updateUI();
  </script>
</body>
</html>
